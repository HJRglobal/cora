# F3 Brand Social Media Accounts — used by the influencer scan scheduler
#
# Handles confirmed by Harrison 2026-05-23.
#
# Still needed after completing META_SETUP_GUIDE.md:
#   - instagram.ig_user_id_env: populate the corresponding .env key with the
#     numeric IG Business Account ID (from META_SETUP_GUIDE step 4)
#   - instagram.access_token_env: populate with the Long-Lived Access Token
#     (from META_SETUP_GUIDE step 5)
#
# .env keys to add:
#   INSTAGRAM_F3E_USER_ID=<numeric ID>
#   INSTAGRAM_F3E_ACCESS_TOKEN=<LLAT>
#   INSTAGRAM_F3MOOD_USER_ID=<numeric ID>       ← for @drinkf3mood until handle transfer completes
#   INSTAGRAM_F3MOOD_ACCESS_TOKEN=<LLAT>
#   INSTAGRAM_F3PURE_USER_ID=<numeric ID>
#   INSTAGRAM_F3PURE_ACCESS_TOKEN=<LLAT>
#
# Slack channel for detection notifications:
#   INFLUENCER_SCAN_NOTIFY_CHANNEL=f3-sales   (channel name without #)
#
# Last updated: 2026-05-23

brands:
  - entity: F3E
    display_name: "F3 Energy"
    instagram:
      handle: "f3energy"
      ig_user_id_env: "INSTAGRAM_F3E_USER_ID"
      access_token_env: "INSTAGRAM_F3E_ACCESS_TOKEN"
      monitored_hashtags:
        - "F3Energy"
        - "DrinkF3Energy"
    tiktok:
      handle: "f3energy"
      # Monitoring pending TikTok Research API approval — see tiktok_monitor.py

  - entity: F3E
    display_name: "F3 Mood"
    instagram:
      # TRANSITIONAL: handle is currently @drinkf3mood; Meta handle transfer to @f3mood
      # is in progress. Update handle + env key names here once transfer completes.
      handle: "drinkf3mood"
      ig_user_id_env: "INSTAGRAM_F3MOOD_USER_ID"
      access_token_env: "INSTAGRAM_F3MOOD_ACCESS_TOKEN"
      monitored_hashtags:
        - "DrinkF3Mood"
        - "F3Mood"          # include future handle so posts using it are caught immediately
        - "CalmTheNoise"
    tiktok:
      handle: "drinkf3mood"  # update to f3mood once handle transfer completes
      # Monitoring pending TikTok Research API approval — see tiktok_monitor.py

  - entity: F3E
    display_name: "F3 Pure"
    instagram:
      handle: "f3pure"
      ig_user_id_env: "INSTAGRAM_F3PURE_USER_ID"
      access_token_env: "INSTAGRAM_F3PURE_ACCESS_TOKEN"
      monitored_hashtags:
        - "F3Pure"
        - "DrinkF3Pure"
        - "RealEnergyRealLife"
    tiktok:
      handle: "f3pure"
      # Monitoring pending TikTok Research API approval — see tiktok_monitor.py
