# =============================================================================
# F3 AI-Visibility Prompt Baskets  —  v1  (2026-07-02)
# =============================================================================
# Purpose: the fixed "instrument" for measuring whether AI answer engines
# (ChatGPT / Gemini / Perplexity / Claude) recommend F3 Energy, Pure, and Mood.
#
# HARD RULE — THIS IS A FROZEN INSTRUMENT:
#   * Never reword or delete an existing prompt id. Rewording silently breaks
#     week-over-week trend comparability (see build brief, "non-determinism").
#   * To evolve the basket: bump `version`, ADD new ids, leave old ones stable.
#
# THIS REPO COPY IS AUTHORITATIVE (per the build brief, 2026-07-07). The Drive
# original at 02-F3-Energy/projects/ai-visibility/ is the historical source; make
# every change HERE and keep the Drive copy pointed at this file. Prompt `text`
# values are byte-identical to the frozen Drive v1 (em-dashes preserved) so the
# instrument stays comparable week-over-week.
#
# Consumed by: the Cora AI-visibility engine (scripts/run_ai_visibility_scan.py).
# Also usable manually: paste the `text` values into a cheap tracker (Otterly /
# Peec) for the Phase-0 baseline.
#
# intent buckets:
#   discovery  = category "best X" queries        (unaided; highest signal)
#   problem    = use-case / "what should I drink"  (unaided; highest signal)
#   comparison = "X vs Y" or "alternative to X"    (mixed aided/unaided)
#   branded    = names F3 directly                 (aided; tests how we're described)
#
# aided:  false = F3 is NOT named in the prompt (did we surface on our own?)
#         true  = F3 IS named (how does the model describe / rate us?)
#
# Per-prompt fields: id | text | intent | aided
# Competitor sets are brand-level (below) — the classifier scores share-of-voice
# against them. Sets mirror the F3 marketing blueprint (2026-06-21).
# =============================================================================

version: 1
created: 2026-07-02
owner: F3E

sampling:
  runs_per_prompt: 5                 # beat non-determinism; report a RATE not yes/no
  models:                            # grounded/web-search variants ONLY (not base models)
    - perplexity_sonar               # best single proxy for "AI search"; returns citations
    - openai_web_search              # OpenAI Responses API, web_search tool
    - gemini_grounding               # Gemini "Grounding with Google Search"
    - claude_web                     # Anthropic w/ web search
  cadence: weekly
  # Google AI Overviews / AI Mode has NO direct model API. It IS covered by the
  # engine via the Otterly public API (source-tag aio_otterly), merged as a 5th
  # engine into the score. The 4 models above are queried directly by Cora and
  # remain the authoritative/primary score for those engines.

# -----------------------------------------------------------------------------
brands:

  energy:
    brand_name: "F3 Energy"
    # classifier must confirm the BEVERAGE brand, not "F3 Nation" (fitness) or other "F3"s
    aliases: ["F3 Energy", "F3Energy", "F3 energy drink"]
    disambiguation: "Beverage brand (functional energy drink). NOT F3 Nation fitness, NOT Formula 3."
    positioning: "Premium functional energy — physical energy + mental clarity + nootropics; MMA/combat & athlete community."
    competitor_set: ["Red Bull", "Monster", "Celsius", "Alani Nu", "Ghost", "C4", "Prime", "Reign", "Bang"]
    prompts:
      # --- discovery (unaided) ---
      - {id: ENG-D01, text: "What's the best functional energy drink in 2026?", intent: discovery, aided: false}
      - {id: ENG-D02, text: "What's the healthiest energy drink?", intent: discovery, aided: false}
      - {id: ENG-D03, text: "Best energy drink for focus and mental clarity?", intent: discovery, aided: false}
      - {id: ENG-D04, text: "Best energy drink for athletes?", intent: discovery, aided: false}
      - {id: ENG-D05, text: "Best energy drink for MMA and combat sports training?", intent: discovery, aided: false}
      - {id: ENG-D06, text: "Best natural energy drink with nootropics?", intent: discovery, aided: false}
      - {id: ENG-D07, text: "Best energy drink that doesn't give you a crash?", intent: discovery, aided: false}
      - {id: ENG-D08, text: "Best zero sugar energy drink?", intent: discovery, aided: false}
      - {id: ENG-D09, text: "Top energy drink brands to try in 2026?", intent: discovery, aided: false}
      - {id: ENG-D10, text: "Best energy drink to take before a workout?", intent: discovery, aided: false}
      - {id: ENG-D11, text: "Which energy drink has the best ingredients?", intent: discovery, aided: false}
      # --- problem / use-case (unaided) ---
      - {id: ENG-P01, text: "What energy drink gives you energy without the jitters?", intent: problem, aided: false}
      - {id: ENG-P02, text: "What can I drink for long-lasting energy and focus?", intent: problem, aided: false}
      - {id: ENG-P03, text: "I want an energy drink that helps mental clarity, not just caffeine. Any recommendations?", intent: problem, aided: false}
      - {id: ENG-P04, text: "What's a good energy drink that isn't Red Bull or Monster?", intent: problem, aided: false}
      - {id: ENG-P05, text: "Energy drink with L-theanine and caffeine for clean focus?", intent: problem, aided: false}
      - {id: ENG-P06, text: "What energy drink do fighters and athletes actually drink?", intent: problem, aided: false}
      - {id: ENG-P07, text: "Best nootropic energy drink for productivity and focus at work?", intent: problem, aided: false}
      - {id: ENG-P08, text: "What's a good energy drink for the gym and cardio?", intent: problem, aided: false}
      # --- comparison ---
      - {id: ENG-C01, text: "F3 Energy vs Celsius — which is better?", intent: comparison, aided: true}
      - {id: ENG-C02, text: "F3 Energy vs Red Bull?", intent: comparison, aided: true}
      - {id: ENG-C03, text: "F3 Energy vs Monster?", intent: comparison, aided: true}
      - {id: ENG-C04, text: "F3 Energy vs Alani Nu?", intent: comparison, aided: true}
      - {id: ENG-C05, text: "F3 Energy vs Ghost Energy?", intent: comparison, aided: true}
