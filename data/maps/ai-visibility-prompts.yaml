      - {id: ENG-C07, text: "What's the best alternative to Celsius?", intent: comparison, aided: false}
      # --- branded (aided) ---
      - {id: ENG-B01, text: "Is F3 Energy any good?", intent: branded, aided: true}
      - {id: ENG-B02, text: "What is F3 Energy?", intent: branded, aided: true}
      - {id: ENG-B03, text: "What are the ingredients in F3 Energy and is it healthy?", intent: branded, aided: true}
      - {id: ENG-B04, text: "Where can I buy F3 Energy?", intent: branded, aided: true}
      - {id: ENG-B05, text: "F3 Energy review — is it worth it?", intent: branded, aided: true}
      - {id: ENG-B06, text: "Who makes F3 Energy and who founded it?", intent: branded, aided: true}
