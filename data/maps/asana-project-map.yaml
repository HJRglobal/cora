# Asana Project Resolution Map
# Used by Cora to route task creation to the correct project
# Last updated: 2026-06-06
#
# Routing priority order (highest to lowest):
#   1. blocked_projects  — Cora NEVER creates tasks here (Harrison Private)
#   2. assignee_rules    — if assignee matches a person, override to their home project
#   3. meeting_title_patterns — if Fireflies meeting title matches, route here
#   4. brand_rules       — F3E only: if Pure/Mood/Energy keyword found, brand-specific routing
#   5. keyword_rules     — if any keyword matches task title or description
#   6. catch_all_gid     — fallback when nothing else matches
#
# GIDs never change when projects are renamed — this map stays stable through renames.
# When adding a new project, add its GID and keywords here before using it.

