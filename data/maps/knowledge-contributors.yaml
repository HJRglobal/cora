# Knowledge Contributors Registry
# Authorizes Slack users to submit knowledge contributions to Cora.
#
# tier:
#   "approver"    — can submit AND approve/decline contributions for their entities
#   "contributor" — can submit; contributions queue for an approver to review
#
# Each entity's queue routes to #cora-kq-{entity.lower()} in Slack.
# Create those channels and invite Cora before enabling contributors.
#
# Required queue channels:
#   #cora-kq-fndr   #cora-kq-hjrg   #cora-kq-f3e    #cora-kq-lex
#   #cora-kq-osn    #cora-kq-osngm  #cora-kq-osnvv  #cora-kq-osngf  #cora-kq-osngw
#   #cora-kq-bdm    #cora-kq-lex-llc  #cora-kq-lex-lts
#   #cora-kq-lex-lbhs  #cora-kq-lex-lla

