# Supervisor hierarchy — drives access control on Cora's third-party Asana lookup tool.
#
# Rule (per Harrison 2026-05-21): only direct or transitive supervisors of a person
# can query that person's Asana tasks via `asana_get_user_tasks`. Self-query is
# always allowed (and uses `asana_get_my_tasks` anyway). Harrison (founder) is
# implicit supervisor of everyone — universal override.
#
# Structure: `reports_to` is a list of (report → supervisor) pairs. Each
# slack_user_id can appear as a report in exactly ONE row (single-supervisor
# model). Transitive supervision is computed at query time by walking up the
# chain until we hit the founder.
#
# Source of truth for the org structure: G:\My Drive\HJR-Founder-OS\memory\people.md
# (manually mirrored here — when memory/people.md changes, update this file too).
#
# To add a new user:
# 1. Add them to data/maps/slack-to-asana.yaml first.
# 2. Add a `report:` row here pointing at their supervisor's slack_user_id.
# 3. Optionally add aliases for them in data/maps/user-aliases.yaml.
# 4. Restart Cora to refresh the cached hierarchy.
#
# Edge cases to revisit (currently strict — peer-query denied):
# - Larry Stone (BDM Creative Director) cannot query Daniel Sion's tasks even
#   though they both work on BDM content. Both report to Demi. If cross-functional
#   peer visibility becomes a need, consider adding a `peer_visibility` rule.
# - Cross-entity managers (e.g., Hannah Grant as ops anchor spanning entities)
#   have no transitive authority over entity-specific reports they don't manage.
#   Hannah cannot query Larry's tasks even though she touches BDM workflow.

