# Slack user ID → Asana user mapping for Cora tool-use.
#
# Cora resolves the @-mentioning Slack user to their Asana gid + email via this file,
# then queries Asana on their behalf using Harrison's PAT (single-PAT MVP model).
#
# Auto-generated by scripts/build_user_map.py (2026-05-18) — 11 auto-matched by email,
# 4 manually cross-referenced (email domain differs between Slack and Asana).
#
# To add a user:
# 1. In Slack, click their profile → "..." → Copy Member ID (starts with U)
# 2. In Asana, click their profile → URL has /0/{gid}/list — copy {gid} (numeric)
# 3. Re-run scripts/build_user_map.py — it will auto-match if emails align.
#
# Phase 3+ migration path: replace this file with OAuth per-user tokens, drop the gid lookup.

