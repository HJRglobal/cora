# Role-based briefing configuration for Cora's per-role morning briefings.
#
# Each entry maps a Slack user ID to their role profile, which controls:
#   - entity: their primary entity (for Asana task filtering + channel routing)
#   - role: human-readable role label used in briefing prompt
#   - extra_data: list of additional data sources to pull for this role
#       hubspot_f3e    -- F3E Retail HubSpot pipeline summary
#       hubspot_all    -- All pipelines HubSpot summary (for FNDR/HJRG roles)
#       financial      -- Cash flow snapshot (for finance roles)
#       deal_aging     -- Flag any aging deals (for sales roles)
#   - briefing_channel: if set, post briefing to this channel instead of DM
#     (leave blank to use DM -- default)
#   - skip_briefing: if true, skip this user entirely (e.g. external contractors)

users:

  # ---- Founder ---------------------------------------------------------------
  - slack_user_id: U0B2RM2JYJ1        # Harrison Rogers
    role: "Founder / CEO"
    entity: FNDR
    extra_data:
      - hubspot_all
      - financial
      - deal_aging
    briefing_channel: ""               # DM Harrison directly

