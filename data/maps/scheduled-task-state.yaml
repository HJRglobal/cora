# Intended scheduled-task state -- single source of truth for the nightly health
# check (scripts/nightly_health_check.py, audit N8). Reconcile this file whenever
# you enable or disable a Cora task.
#
# Severity contract: a disabled-state drift (a task listed here found enabled, or
# a task NOT here found disabled) is a WARNING, never a CRITICAL -- a Disabled
# task is a deliberate admin action, not an outage, and Task Scheduler never
# auto-flips it. The ONLY task-state CRITICAL is the always-on service
# (`running`) not being Running.

running:
  - cowork-cora-service

disabled:
  # PUSH meeting capture RETIRED 2026-06-18 (push -> pull). The auto-create task
  # is disabled; meeting action items are now created on request via the
  # meeting_action_items pull tool. SUPERSEDES the prior D-052 "it is ENABLED"
  # note. Flip with deployment/disable-meeting-action-capture-2026-06-18.ps1.
  - Cora - Meeting Action Capture
  # Gmail sync -- precision too low (paused)
  - cowork-cora-asana-email-sync
  - cowork-cora-hubspot-email-sync
  # Wrong-entity content bug (fix queued)
  - cowork-cora-proactive-gaps
  # Moved to Make.com 2026-06-05
  - Cora - HubSpot Deal Monitor
  - Cora - Shopify DTC Summary
  - Cora - Deal Aging Alerts
  - Cora - Weekly Pipeline Digest
  # Clover retired 2026-06-05/06 (D-027 / D-032). "Cora - Clover Daily Summary"
  # was REMOVED from the host (2026-07-03, audit W4-03/W8-03) -- a removed task is
  # not an "expected disabled" task, same as the delisted "Cora - LinkedIn Spy".
  # cowork-clover-daily-pull remains present-but-Disabled on the host, so it stays.
  - cowork-clover-daily-pull
  # Cash Pulse disabled 2026-06-16 (gate G-E / audit N1)
  - Cora - Cash Flow Pulse
  # Legacy manual gap digest, superseded by the daily knowledge-review DM drain
