# Intended scheduled-task state -- single source of truth for the nightly health
# check (scripts/nightly_health_check.py, audit N8). Reconcile this file whenever
# you enable or disable a Cora task.
#
# Severity contract: a disabled-state drift (a task listed here found enabled, or
# a task NOT here found disabled) is a WARNING, never a CRITICAL -- a Disabled
# task is a deliberate admin action, not an outage, and Task Scheduler never
# auto-flips it. The ONLY task-state CRITICAL is the always-on service
# (`running`) not being Running.

