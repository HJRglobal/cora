# Email accounts monitored by Cora for two purposes:
#   1. Attachment auto-filing (run_attachment_filer.py -- every 4h)
#   2. Full-thread KB ingestion (gmail_threaded_sweep.py -- nightly 2:30am AZ)
#
# DWD eligibility rules:
#   - Only works for accounts within Google Workspace orgs that Harrison
#     administers directly. The service account DWD grant must cover the
#     account's domain.
#   - @hjrglobal.com -- covered (primary HJR workspace, DWD confirmed active).
#   - @f3energy.com -- set dwd_eligible: false until Harrison confirms f3energy.com
#     is a domain he administers in Google Workspace admin.
#   - @lexingtonservices.com -- set dwd_eligible: false until Harrison confirms
#     lexingtonservices.com domain is under his Google Workspace admin or that
#     org's admin grants DWD to the Cora SA.
#   - @unitedfightleague.com -- set dwd_eligible: false until confirmed.
#   - Personal Gmail (@gmail.com) -- NOT eligible for DWD ever.
#
# To enable a non-hjrglobal.com account:
#   1. Confirm Harrison administers that domain in Google Workspace.
#   2. In Google Admin -> Security -> API Controls -> Domain-wide Delegation
#      -> Edit Cora SA entry -> confirm gmail.modify scope is present.
#   3. Flip enabled: true + dwd_eligible: true.
#
# PHI NOTE for @lexingtonservices.com accounts:
#   gmail_threaded_sweep.py has a subject-keyword PHI guardrail (_is_phi_risk)
#   that skips chunks matching client-care terminology. Reconciliation engine
#   also enforces PHI exclusion before all passes. Harrison is sole authority
#   on access decisions per 2026-05-21 doctrine.
