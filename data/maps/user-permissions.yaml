# User-level Q&A permissions for Cora.
#
# Controls which entities a Slack user can ask Cora about — regardless of
# which channel they're in. Both checks must pass before Cora answers:
#   1. Channel entity scope (channel-routing.yaml)
#   2. User entity scope (this file)
#
# If a user is not listed here, they get FNDR-level read access (cross-entity
# overview, no sensitive sub-entity detail).
#
# sensitive_topics_blocked: topics Cora refuses for this user even in allowed entities.
# Options: financials, hr, legal, phi, cap_table, cross_entity, marketing, events
#
# Harrison (U0B2RM2JYJ1) is the root authority — no restrictions apply.

