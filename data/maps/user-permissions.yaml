# User-level Q&A permissions for Cora.
#
# Controls which entities a Slack user can ask Cora about — regardless of
# which channel they're in. Both checks must pass before Cora answers:
#   1. Channel entity scope (channel-routing.yaml)
#   2. User entity scope (this file)
#
# If a user is not listed here, they get FNDR-level read access (cross-entity
# overview, no sensitive sub-entity detail).
#
# sensitive_topics_blocked: topics Cora refuses for this user even in allowed entities.
# Options: financials, hr, legal, phi, cap_table, cross_entity
#
# Harrison (U0B2RM2JYJ1) is the root authority — no restrictions apply.

users:

  U0B2RM2JYJ1:  # Harrison Rogers
    name: Harrison Rogers
    allowed_entities: all
    sensitive_topics_blocked: []

  U0B3AEQS0NB:  # Hannah Grant — Ops anchor, HJRG + F3E + LEX
    name: Hannah Grant
    allowed_entities:
      - FNDR
      - HJRG
      - F3E
      - LEX
      - LEX-LLC
      - LEX-LTS
      - LEX-LBHS
      - LEX-LLA
      - BDM
      - UFL
    sensitive_topics_blocked:
      - phi          # No client-level PHI even in LEX channels
      - cap_table    # No ownership/equity details

  U0B3VGWJTMJ:  # Alex Cordova — F3E sales + UFL sponsorships
    name: Alex Cordova
    allowed_entities:
      - F3E
      - UFL
      - HJRG
    sensitive_topics_blocked:
      - financials   # P&L, cash flow — those go to Harrison/Justin
      - hr
