# F3 LinkedIn Spy — weekly prospect search configuration
#
# Apollo Search API is FREE (no credit cost per call). Credits are only consumed
# when contact details (email/phone) are "revealed" — this scanner never triggers
# reveals. It surfaces title + company + LinkedIn URL only.
#
# Edit this file to refine targeting; no code change needed.

# --- Job title targeting -------------------------------------------------------
# Apollo matches any person whose title CONTAINS one of these strings (case-insensitive).
target_titles:
  - buyer
  - senior buyer
  - category manager
  - category director
  - beverage buyer
  - natural foods buyer
  - grocery buyer
  - vp of merchandising
  - vp merchandising
  - director of merchandising
  - head of beverages
  - head of grocery
  - director of purchasing
  - vp purchasing
  - vp of purchasing
  - retail buyer
  - merchandise manager
  - director of retail
  - natural channel manager
  - vp of retail
  - director of retail sales
  - head of retail

# --- Keyword search (biases results toward relevant industries) ----------------
search_keywords: "retail grocery natural foods energy drink functional beverage"

# --- Geography ----------------------------------------------------------------
# Limits results to US-based contacts.
person_locations:
  - United States

# --- Channel → brand fit mapping ----------------------------------------------
# Used by Claude to assign the right F3 sub-brand angle based on company name keywords.
# Keys are lowercase match strings; first match wins.
channel_fit:
  - keywords: [sprouts, whole foods, natural grocers, "fresh market", "bristol farms", "market of choice", co-op, "natural & organic", "organic grocery"]
    brand: "F3 Pure"
    tagline: "Real energy for real life."
    angle: "clean-label natural channel — Lauren avatar (25-35, Pilates-mom / Sprouts-regular)"

  - keywords: ["circle k", "casey's", wawa, speedway, "7-eleven", kwik, "love's", "pilot", "travel centers", "convenience store", "gas station"]
    brand: "F3 Energy"
    tagline: "Fuel. Focus. Finish."
    angle: "convenience channel — Alex avatar (22-42, trains regularly, knows his nootropics)"

  - keywords: ["vitamin shoppe", gnc, "bodybuilding.com", "supplement", "nutrition center", "sports nutrition", "fitness store"]
    brand: "F3 Energy"
    tagline: "Fuel. Focus. Finish."
    angle: "sports performance channel — Alex avatar (22-42, performance-focused)"

  - keywords: [kroger, walmart, target, publix, "h-e-b", heb, albertsons, safeway, aldi, costco, "sam's club", meijer, wegmans]
    brand: "F3 Energy"
    tagline: "Fuel. Focus. Finish."
    angle: "mass grocery / big box channel — energy drink shelf placement"

  - keywords: []  # default — catches anything not matched above
    brand: "F3 Energy"
    tagline: "Fuel. Focus. Finish."
    angle: "general retail — position on performance and functional differentiation"

# --- Scan volume --------------------------------------------------------------
per_page: 100       # results per Apollo page (max 100)
max_pages: 3        # pages to pull per run → up to 300 candidates evaluated
max_report_items: 10  # max new prospects to surface in the Slack report each week

# --- Slack delivery -----------------------------------------------------------
notify_channel: "f3e-sales"
