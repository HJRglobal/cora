# Org Role Registry -- canonical per-person role + responsibility map.
# ---------------------------------------------------------------------------
# Phase 1 of the Org Synthesis program (spec:
# _shared/projects/cora/design/2026-06-10_fndr_org-synthesis-spec.md).
#
# This is the single source of truth for WHO each person is in the
# organization: their role, primary entity, responsibilities ("lanes"),
# manager, and routing notes. org_roles.py loads it with a 60s TTL --
# edit this file and Cora picks it up without a restart.
#
# What this file is FOR:
#   - Role-aware context injection: when a user @-mentions or DMs Cora,
#     their role block is added to the runtime context so answers are
#     tailored to their position, entity, and role.
#   - Phases 2-4 (per-user proactive assistant, efficiency mining, founder
#     strategy layer) all read this registry.
#
# What this file is NOT:
#   - NOT an access-control list. Access is governed by the deterministic
#     guards (user_access, sibling_guard, cross_entity_guard, phi_guard,
#     historical_access D-043). A role entry NEVER expands what a user may
#     see. Unknown users simply get no role block (fail-closed to neutral).
#
# Relationship to other maps (deliberately NOT merged -- they drive live
# systems; this registry consolidates the ROLE knowledge layer only):
#   - slack-to-asana.yaml        identity resolution (user_identity.py)
#   - role-briefing-config.yaml  morning-briefing task config (Tier 1)
#   - lex-phi-custodians.yaml    PHI custodian gate (lex_phi_access.py)
#   - finance-receipt-allowlist.yaml  Tier 2-Finance gate
#   - gap-domain-owners.yaml     gap-escalation routing
#
# Field reference:
#   slack_id          primary key when present; registry-only entries (no
#                     Slack access, e.g. part-time staff) may omit it -- they
#                     ride the roster but never trigger role injection
#   name              display name
#   role              human-readable title
#   entity            primary entity code (FNDR/HJRG/F3E/OSN/LEX/BDM/HJRP/UFL/...)
#   entities          optional; additional entities they actively work in
#   responsibilities  list of lanes they own (kept short, factual)
#   manager           slack_id of the person they report to ("" = Harrison)
#   notes             routing cautions for Cora (anti-patterns, do-not-route)
#   external: true    guest / outside consultant (never receives internal
#                     proactive comms; role block still injected)
#
# Sources consolidated 2026-06-10: founder CLAUDE.md "Key delegates",
# role-briefing-config.yaml, slack-to-asana.yaml, monitored-email-accounts.yaml,
# entity system prompts. Roster changes go through Harrison.
# ---------------------------------------------------------------------------

