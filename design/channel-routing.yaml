# Channel-name → entity routing for Cora.
# Patterns are matched top-to-bottom; first match wins.
# Supports fnmatch glob syntax (*, ?) on channel names (without the # prefix).
# Add exceptions above the catch-all wildcard.
#
# Bare-name pattern: every entity has a bare entity-name channel (e.g. #osn, #f3e, #lex)
# in addition to functional channels (#osn-leadership etc.). Each entity block lists
# the bare-name pattern FIRST, then the dash-prefix pattern, then any non-prefixed
# OSN/F3E-owned channels (e.g. #clover-daily belongs to OSN, #polar-metrics to F3E).
# Bug history: prior to 2026-05-22, `osn-*` glob did NOT match bare `#osn` channel,
# causing @-mentions in the entity catch-all channel to fall through to FNDR scope.

routes:
  # ── cora-kq-* channels ──────────────────────────────────────────────────────
  # Private "knowledge query" channels: one per entity, created 2026-05-30.
  # Must appear BEFORE the entity-prefixed blocks (first match wins).
  # Ordering within this block mirrors the entity blocks below so the
  # sub-entity patterns land above their parent catch-alls.
  - pattern: "cora-kq-fndr"
    entity: FNDR
  - pattern: "cora-kq-hjrg"
    entity: FNDR
  - pattern: "cora-kq-f3e"
    entity: F3E
  - pattern: "cora-kq-lex-llc"
    entity: LEX-LLC
  - pattern: "cora-kq-lex-lts"
    entity: LEX-LTS
  - pattern: "cora-kq-lex-lbhs"
    entity: LEX-LBHS
  - pattern: "cora-kq-lex-lla"
    entity: LEX-LLA
  - pattern: "cora-kq-lex"
    entity: LEX
  - pattern: "cora-kq-osngm"
    entity: OSNGM
  - pattern: "cora-kq-osnvv"
    entity: OSNVV
  - pattern: "cora-kq-osngf"
    entity: OSNGF
  - pattern: "cora-kq-osngw"
    entity: OSNGW
  - pattern: "cora-kq-osn"
    entity: OSN
  - pattern: "cora-kq-bdm"
    entity: BDM

  # ── BLOCKED: workspace default general channel — Cora must NEVER post here ──
  # Channel ID C0B2NMLK7CK. Originally #all-hjr-global, renamed 2026-06-02.
  # Slack prevents archiving this channel (it is the workspace general channel).
  # Code-level block in app.py (_BLOCKED_CHANNEL_IDS) enforces this as a hard stop.
  - pattern: "general-do-not-use"
    entity: FNDR
    silent: true
    blocked: true
  - pattern: "all-hjr-global"
    entity: FNDR
    silent: true
    blocked: true

  # ── Automated feed channels — Cora ignores @mentions silently ──────────────
  # These are bot-posting channels only. No human conversation happens here.
  - pattern: "asana-feed"
    entity: FNDR
    silent: true
  - pattern: "fireflies-recaps"
    entity: FNDR
    silent: true
  - pattern: "notion-changes"
    entity: FNDR
    silent: true
  - pattern: "hubspot-feed"
    entity: FNDR
    silent: true
  - pattern: "drive-shares"
    entity: FNDR
    silent: true

  # ── UFL ─────────────────────────────────────────────────────────────────────
  - pattern: "ufl"
    entity: UFL
  - pattern: "ufl-*"
    entity: UFL

  # ── F3 Community (nonprofit) ─────────────────────────────────────────────────
  - pattern: "f3c"
    entity: F3C
  - pattern: "f3c-*"
    entity: F3C

  # ── HJR Productions / Personal brand ────────────────────────────────────────
  - pattern: "hjrprod"
    entity: HJRPROD
  - pattern: "hjrprod-*"
    entity: HJRPROD
  - pattern: "harrisonjrogers-social"
    entity: HJRPROD
  - pattern: "hjr-podcast-social"
    entity: HJRPROD

  # ── Shaun's leadership channel — routes to LEX (he runs Lexington) ───────────
  - pattern: "shaun-leadership"
    entity: LEX

  # F3 Energy — covers bare #f3e, f3e-*, the f3-* exception (Pure launch etc.),
  # plus #polar-metrics (F3E ad spend dashboard, non-standard naming)
  - pattern: "f3e"
    entity: F3E
  - pattern: "f3e-*"
    entity: F3E
  - pattern: "f3-*"
    entity: F3E
  - pattern: "polar-metrics"
    entity: F3E

  # Lexington LLC sub-entity — bare #llc and llc-* channels
  # Must appear BEFORE the lex-* block (first match wins; llc-* ≠ lex-* but ordering makes intent explicit).
  - pattern: "llc"
    entity: LEX-LLC
  - pattern: "llc-*"
    entity: LEX-LLC

  # Lexington Therapies sub-entity — bare #lts and lts-* channels
  - pattern: "lts"
    entity: LEX-LTS
  - pattern: "lts-*"
    entity: LEX-LTS

  # Lexington Behavioral Health Services sub-entity — bare #lbhs and lbhs-* channels
  - pattern: "lbhs"
    entity: LEX-LBHS
  - pattern: "lbhs-*"
    entity: LEX-LBHS

  # Lex Life Academy sub-entity — bare #lla and lla-* channels
  - pattern: "lla"
    entity: LEX-LLA
  - pattern: "lla-*"
    entity: LEX-LLA

  # Lexington Services GM-level — bare #lex and lex-* channels
  # Catches #lex, #lex-leadership, #lex-finance, #lex-hr, #lex-hcbs, #lex-dta, #lex-cora-build, etc.
  # Uses the GM-level LEX prompt (Shaun's cross-sub-entity view; no sub-entity private detail).
  # Bug history: prior to 2026-05-22, bare #lex fell through to FNDR; bare-name pattern added then.
  # Bug history: prior to 2026-05-23, single LEX entity had no sub-entity siloing — caused LLA equity
  # disclosure in an LLC channel. Sub-entity routing above fixes the root cause.
  - pattern: "lex"
    entity: LEX
  - pattern: "lex-*"
    entity: LEX

  # OSN individual stores — each store has its own entity code, QBO account, and channel set.
  # Channel prefix matches the entity code (e.g. #osngm-finance → OSNGM).
  # These sit above the osn-* catch-all; osngm-* etc. don't technically match osn-*
  # (fnmatch requires the literal dash), but explicit ordering makes intent clear.
  # Store codes align with the shift scheduler (GM / VVP / GF / GW).
  - pattern: "osngm"
    entity: OSNGM
  - pattern: "osngm-*"
    entity: OSNGM
  - pattern: "osnvv"
    entity: OSNVV
  - pattern: "osnvv-*"
    entity: OSNVV
  - pattern: "osngf"
    entity: OSNGF
  - pattern: "osngf-*"
    entity: OSNGF
  - pattern: "osngw"
    entity: OSNGW
  - pattern: "osngw-*"
    entity: OSNGW

  # OSN (4-store group parent) — covers bare #osn, osn-*, plus #clover-daily
  # (OSN cross-store sales summary, non-standard naming)
  - pattern: "osn"
    entity: OSN
  - pattern: "osn-*"
    entity: OSN
  - pattern: "clover-daily"
    entity: OSN

  # BDM — covers bare #bdm, bdm-*, and #media (BDM client work catch-all, C0B2Z7Z7C84).
  # Note: #media is a non-standard channel name owned by BDM for cross-client production
  # work. Added 2026-05-24 per bdm.md wishlist Category 4.
  #
  # Per-client channels (all private, all covered by bdm-* wildcard):
  #   #bdm-f3energy      C0B610J3PH7  — F3 Energy (all 3 brands) [created 2026-05-24]
  #   #bdm-osn           C0B5X49CN6A  — One Stop Nutrition [created 2026-05-24]
  #   #bdm-hjrpodcast    C0B5X5D3QQN  — HJR Podcast / HJR Productions [created 2026-05-24]
  #   #bdm-arie-lauren   C0B5X5BK39U  — Arie + Lauren (external couple client) [created 2026-05-24]
  #   #bdm-demi-brand    C0B5SRVGWRZ  — Demi Bagby personal brand [created 2026-05-24]
  #   #bdm-lac           C0B5Z7CAW74  — Luxury Auto Collection (external) [created 2026-05-24]
  #   #bdm-berry-divine  C0B5SQS9X7D  — Berry Divine (external, confidential) [created 2026-05-24]
  #   #bdm-redbull       C0B5Z68FBNE  — Red Bull (external, confidential) [created 2026-05-24]
  #   #bdm-mclaren       C0B6TEUMMB2  — McLaren (external, confidential) [created 2026-05-24]
  #   #bdm-lifted-trucks C0B6TEUV0RE  — Lifted Trucks (external, confidential) [created 2026-05-24]
  # Archived (superseded): #bdm-lexington C0B5SQQGSAX, #bdm-podcast C0B611CE17T, #bdm-properties C0B6TESPS3A
  - pattern: "bdm"
    entity: BDM
  - pattern: "bdm-*"
    entity: BDM
  - pattern: "media"
    entity: BDM

  # HJR Properties — sub-property channels route to specific entity codes
  # so QBO P&L tools auto-filter to the correct building class.
  - pattern: "hjrp-1337"
    entity: HJRP-1337
  - pattern: "hjrp-1555"
    entity: HJRP-1555

  # HJR Properties — covers bare #hjrp, hjrp-*, plus #rogers-ranch (HJRP-RR sub-entity catch-all)
  # and #rogers-ranch-* (operational booking + future sub-channels). Cora loads
  # 06-HJR-Properties/CLAUDE.md as HJRP context, plus rogers-ranch/CLAUDE.md when
  # routing to a rogers-ranch-* channel (sub-entity context layered on parent).
  - pattern: "hjrp"
    entity: HJRP
  - pattern: "hjrp-*"
    entity: HJRP
  - pattern: "rogers-ranch"
    entity: HJRP
  - pattern: "rogers-ranch-*"
    entity: HJRP

  # HJR Global / Founder-level channels — HJRG functional channels route to FNDR
  # because Cora's FNDR system-prompt has the cross-entity holdco lens.
  - pattern: "hjrg"
    entity: FNDR
  - pattern: "hjrg-*"
    entity: FNDR
  - pattern: "fndr*"
    entity: FNDR

  # Catch-all → founder-level context with explicit framing in response
  - pattern: "*"
    entity: FNDR
