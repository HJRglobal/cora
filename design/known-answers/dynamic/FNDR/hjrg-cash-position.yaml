# Dynamic known-answer: HJR Global cross-portfolio cash position
# Loaded by context_loader when entity=FNDR (includes #hjrg-* channels per YAML routing).
# Phase 2 will auto-refresh snapshot from Visibility's weekly Google Sheet.
topic: "HJR Global cross-portfolio cash position + 13-week forecast + active escalations"
snapshot_path: data/snapshots/hjrg-cash-position/latest.yaml
source:
